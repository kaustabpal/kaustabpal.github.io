{{ define "main" }}
<div class="notes-header">
  <p class="notes-title">Notes</p>
  <p class="notes-count">{{ len .Pages }} {{ if eq (len .Pages) 1 }}entry{{ else }}entries{{ end }}</p>
</div>

{{ if .Pages }}
<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <a class="action-list-item" href="{{ .RelPermalink }}">
      <span class="action-list-icon">→</span>
      <span class="action-list-text">
        <span class="action-list-title">{{ .Title }}</span>
        <span class="action-list-date">{{ .Date.Format "2006-01-02" }}</span>
      </span>
    </a>
  </li>
  {{ end }}
</ul>
{{ end }}
{{ end }}
