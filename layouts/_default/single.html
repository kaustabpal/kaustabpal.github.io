{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <span>{{ .Date.Format "2006-01-02" }}</span>
      {{ with .Params.tags }}
      <span>
        {{ range . }}#{{ . }} {{ end }}
      </span>
      {{ end }}
    </div>
  </header>

  {{ $toc := .TableOfContents }}
  {{ if ne $toc "<nav id=\"TableOfContents\"></nav>" }}
  <div class="toc-title-bar">
    <div class="toc-title-bar-left">
      <span class="toc-label">Contents</span>
    </div>
  </div>
  <div class="toc-block">
    {{ $toc | safeHTML }}
  </div>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
