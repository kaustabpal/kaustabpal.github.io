<header class="site-header">
  <div class="site-wrapper">
    <div class="header-inner">
      <div class="header-logo">
        <a href="/">KP</a>
      </div>
      <nav class="header-nav">
        <a class="action-btn{{ if eq .Section "notes" }} active{{ end }}" href="/notes/">
          <span class="action-btn-key">↗</span>
          <span class="action-btn-label">Notes</span>
        </a>
      </nav>
      <div class="header-actions">
        <button class="action-btn theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <span class="action-btn-key" id="theme-key">○</span>
          <span class="action-btn-label" id="theme-label">Light</span>
        </button>
      </div>
    </div>
  </div>
</header>
